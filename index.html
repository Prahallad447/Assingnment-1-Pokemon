<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POKEMON-PIKA-PIKA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <main>
        <nav>
            <img src="./img/pokemon-logo.png" alt="" class="logo">
            <i class="fa-solid fa-bars"></i>
        </nav>
        <section>
            <div class="pika-main">
                <h3>POKEMON GEN I</h3>
                <h1>Pikachu</h1>
                <p class="paragraph">Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small,
                    chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur.
                </p>
                <div class="date">
                    <div class="line"></div>
                    <p> 01 / 08</p>
                </div>
            </div>
            <img src="./img/pikachu.png" alt="" class="pikachu">
            <div class="circle">
                <i class="fa-solid fa-circle"></i>
                <i class="fa-solid fa-circle"></i>
                <i class="fa-solid fa-circle"></i>
                <i class="fa-solid fa-circle"></i>
                <i class="fa-solid fa-circle"></i>
            </div>
        </section>
        <img src="./img/pokemonball.png" alt="" class="bg-logo">

    </main>

</body>

</html>
